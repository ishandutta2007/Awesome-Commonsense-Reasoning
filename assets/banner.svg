<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2980" />
      <stop offset="100%" stop-color="#26D0CE" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bgGrad)" rx="15" ry="15"/>

  <!-- Dynamic floating nodes for "Commonsense Reasoning" theme -->
  <circle cx="150" cy="100" r="8" fill="#FFF">
    <animate attributeName="cy" values="90;110;90" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="650" cy="80" r="12" fill="#FFF">
    <animate attributeName="cy" values="70;90;70" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="130" r="6" fill="#FFF">
    <animate attributeName="cy" values="120;140;120" dur="5s" repeatCount="indefinite" />
  </circle>

  <path d="M 150 100 Q 400 150 650 80" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none" stroke-dasharray="5 5">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="5s" repeatCount="indefinite" />
  </path>
  <path d="M 150 100 Q 450 50 700 130" stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none" stroke-dasharray="5 5">
    <animate attributeName="stroke-dashoffset" values="0;100" dur="6s" repeatCount="indefinite" />
  </path>

  <!-- Text -->
  <text x="400" y="105" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    Awesome Commonsense Reasoning
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite" />
  </text>
  <text x="400" y="145" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#E0F2F1" text-anchor="middle" letter-spacing="1">
    🧠 History • Progression • Variants • Applications
  </text>
</svg>
